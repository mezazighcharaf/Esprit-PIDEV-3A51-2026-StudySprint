security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                enable_csrf: true
                username_parameter: email
                password_parameter: password
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 1 week

    access_control:
        # Public access
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/password-reset, roles: PUBLIC_ACCESS }
        - { path: ^/reactivation-request, roles: PUBLIC_ACCESS }
        - { path: ^/face-auth, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        # Admin/BO routes
        - { path: ^/admin(/|$), roles: ROLE_ADMIN }
        - { path: ^/bo(/|$), roles: ROLE_ADMIN }
        # FO routes
        - { path: ^/fo(/|$), roles: ROLE_USER }
        - { path: ^/app(/|$), roles: ROLE_USER }
        # API routes
        - { path: ^/api(/|$), roles: ROLE_USER }
        # Legacy
        - { path: ^/m5(/|$), roles: ROLE_USER }

    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]
        ROLE_PROFESSOR: [ROLE_USER]
        ROLE_STUDENT: [ROLE_USER]

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: plaintext
