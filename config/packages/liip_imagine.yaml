liip_imagine:
    # Driver: GD (built-in PHP, no additional extension needed)
    driver: "gd"

    # Web path where cached images are stored
    cache: default
    data_loader: default

    filter_sets:
        # 120x120 thumbnail for sidebar avatar
        avatar_thumb:
            quality: 85
            filters:
                thumbnail:
                    size: [120, 120]
                    mode: outbound
                    allow_upscale: true

        # 300x300 medium avatar for profile page
        avatar_medium:
            quality: 90
            filters:
                thumbnail:
                    size: [300, 300]
                    mode: outbound
                    allow_upscale: true
